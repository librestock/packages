name: Release Packages

on:
  push:
    tags:
      - "types@*"
      - "eslint-config@*"
      - "tsconfig@*"

jobs:
  release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./${{ steps.tag.outputs.package }}/package.json').version")"
          if [ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "Tag version (${{ steps.tag.outputs.version }}) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        working-directory: ${{ steps.tag.outputs.package }}
        run: pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
