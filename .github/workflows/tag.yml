name: Tag Packages

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Tag and publish bumped packages
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mapfile -t releases < <(node <<'NODE'
          const { execSync } = require('child_process');

          const dirs = ['types', 'eslint-config', 'tsconfig'];
          const base = process.env.BASE_SHA;
          const head = process.env.HEAD_SHA;

          function readVersion(ref, dir) {
            try {
              const raw = execSync(`git show ${ref}:${dir}/package.json`, { encoding: 'utf8' });
              return JSON.parse(raw).version;
            } catch {
              return null;
            }
          }

          for (const dir of dirs) {
            const before = readVersion(base, dir);
            const after = readVersion(head, dir);

            if (before && after && before !== after) {
              process.stdout.write(`${dir} ${after}\n`);
            }
          }
          NODE
          )

          if [ "${#releases[@]}" -eq 0 ]; then
            echo "No package version changes detected."
            exit 0
          fi

          created=()
          for release in "${releases[@]}"; do
            package="${release%% *}"
            version="${release#* }"
            tag="${package}@${version}"

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin, skipping."
            else
              git tag "$tag" "$HEAD_SHA"
              created+=("$tag")
            fi

            current_version="$(node -p "require('./${package}/package.json').version")"
            if [ "$current_version" != "$version" ]; then
              echo "Refusing to publish ${package}: expected version ${version}, found ${current_version}."
              exit 1
            fi

            (
              cd "./${package}"
              pnpm publish --access public --no-git-checks
            )
          done

          if [ "${#created[@]}" -gt 0 ]; then
            git push origin "${created[@]}"
          fi
