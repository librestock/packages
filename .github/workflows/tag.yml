name: Tag Packages

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tags for bumped packages
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mapfile -t tags < <(node <<'NODE'
          const { execSync } = require('child_process');

          const dirs = ['types', 'eslint-config', 'tsconfig'];
          const base = process.env.BASE_SHA;
          const head = process.env.HEAD_SHA;

          function readVersion(ref, dir) {
            try {
              const raw = execSync(`git show ${ref}:${dir}/package.json`, { encoding: 'utf8' });
              return JSON.parse(raw).version;
            } catch {
              return null;
            }
          }

          for (const dir of dirs) {
            const before = readVersion(base, dir);
            const after = readVersion(head, dir);

            if (before && after && before !== after) {
              process.stdout.write(`${dir}@${after}\n`);
            }
          }
          NODE
          )

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No package version changes detected."
            exit 0
          fi

          created=()
          for tag in "${tags[@]}"; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin, skipping."
              continue
            fi

            git tag "$tag" "$HEAD_SHA"
            created+=("$tag")
          done

          if [ "${#created[@]}" -eq 0 ]; then
            echo "No new tags to push."
            exit 0
          fi

          git push origin "${created[@]}"
